<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מנהל שער הסקרנות</title>
  <style>
    :root {
      --purple: #bcbfff;
      --lime: #e8ff6a;
      --bg: rgba(8, 10, 28, 0.72);
      --text: #ffffff;
      --muted: #cfd2ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans Hebrew", sans-serif;
      background: transparent;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .app {
      width: min(100vw, 900px);
      height: min(100vh, 175px);
      padding: 12px 26px;
      border-radius: 30px;
      background:
        radial-gradient(circle at 18% 40%, rgba(188,191,255,.22), transparent 35%),
        radial-gradient(circle at 82% 60%, rgba(232,255,106,.13), transparent 34%),
        var(--bg);
      border: 1px solid rgba(232,255,106,.45);
      box-shadow: 0 0 22px rgba(188,191,255,.22);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .screen {
      display: none;
      height: 100%;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 10px;
    }

    .screen.active { display: flex; }

    h1 {
      margin: 0;
      font-size: clamp(26px, 5vw, 40px);
      color: var(--lime);
    }

    .subtitle, .end-text {
      font-size: clamp(16px, 3vw, 22px);
      color: var(--muted);
    }

    .top-row, .middle-row, .bottom-row {
      width: 100%;
      display: grid;
      align-items: center;
    }

    .top-row {
      grid-template-columns: 1fr 2fr 1fr;
      font-size: 16px;
      color: var(--muted);
    }

    .round-label {
      color: var(--lime);
      font-weight: 800;
      text-align: right;
    }

    .phase-label {
      text-align: left;
    }

    .timer {
      justify-self: end;
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 900;
      color: white;
      padding: 4px 18px;
      border-radius: 999px;
      border: 1px solid rgba(188,191,255,.45);
      background: rgba(0,0,0,.18);
    }

    .question {
      text-align: center;
      font-size: clamp(25px, 4.4vw, 38px);
      font-weight: 900;
      line-height: 1.1;
    }

    .middle-row {
      grid-template-columns: 120px 1fr 120px;
      gap: 16px;
    }

    .endpoint {
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 900;
      white-space: nowrap;
    }

    .left { color: var(--purple); text-align: right; }
    .right { color: var(--lime); text-align: left; }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--purple), var(--lime));
      box-shadow: 0 0 14px rgba(232,255,106,.35);
      position: relative;
    }

    .bar::after {
      content: "•••";
      position: absolute;
      inset: -12px 0 0 0;
      color: rgba(255,255,255,.7);
      font-size: 22px;
      letter-spacing: 5px;
      text-align: center;
    }

    .bottom-row {
      grid-template-columns: 150px 1fr 150px;
      gap: 12px;
    }

    .instruction {
      text-align: center;
      font-size: clamp(20px, 3.7vw, 32px);
      color: var(--lime);
      font-weight: 900;
      text-shadow: 0 0 14px rgba(232,255,106,.38);
    }

    .controls {
      display: contents;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    button.main {
      background: var(--lime);
      color: #101221;
      box-shadow: 0 0 14px rgba(232,255,106,.28);
      max-width: 210px;
      justify-self: center;
    }

    button.secondary {
      background: rgba(188,191,255,.12);
      color: white;
      border: 1px solid rgba(188,191,255,.5);
      min-width: 115px;
    }

    .pause-wrap { justify-self: left; }
    .reset-wrap { justify-self: right; }

    .pulse {
      animation: pulse .75s infinite alternate;
      color: var(--lime);
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.06); text-shadow: 0 0 22px rgba(232,255,106,.8); }
    }

    .progress-wrap {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,.12);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 2px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--purple), var(--lime));
      transition: width .35s linear;
    }
  </style>
</head>

<body>
  <main class="app">

    <section id="opening" class="screen active">
      <h1 id="openTitle"></h1>
      <div id="openSubtitle" class="subtitle"></div>
      <button class="main" onclick="startActivity()" id="startBtn"></button>
    </section>

    <section id="activity" class="screen">
      <div class="top-row">
        <div class="round-label" id="roundLabel"></div>
        <div class="phase-label" id="phaseLabel"></div>
        <div class="timer" id="timer"></div>
      </div>

      <div class="question" id="question"></div>

      <div class="middle-row">
        <div id="rightLabel" class="endpoint right"></div>
        <div class="bar"></div>
        <div id="leftLabel" class="endpoint left"></div>
      </div>

      <div class="bottom-row">
        <div class="pause-wrap">
          <button class="secondary" onclick="togglePause()" id="pauseBtn">השהה</button>
        </div>

        <div>
          <div id="instruction" class="instruction"></div>
          <button class="main" onclick="nextStep()" id="nextBtn">הבא</button>
        </div>

        <div class="reset-wrap">
          <button class="secondary" onclick="resetActivity()">איפוס</button>
        </div>
      </div>

      <div class="progress-wrap">
        <div id="progress" class="progress"></div>
      </div>
    </section>

    <section id="ending" class="screen">
      <h1 id="endTitle"></h1>
      <div id="endText" class="end-text"></div>
      <button class="main" onclick="resetActivity()" id="restartBtn"></button>
    </section>

  </main>

  <script>
    const CONTENT = {
      opening: {
        title: "שער הסקרנות",
        subtitle: "בכל סבב עומדים על הקו לפי מה שמתאים לכם",
        button: "התחילו"
      },
      phases: [
        {
          duration: 120,
          label: "שלב א׳",
          instruction: "מצאו את המקום שלכם על הקו"
        },
        {
          duration: 25,
          label: "שלב ב׳",
          instruction: "דברו רגע עם מי שעומד לידכם"
        }
      ],
      rounds: [
        {
          question: "קל לי להכיר אנשים חדשים",
          left: "קשה לי",
          right: "קל לי"
        },
        {
          question: "כשאני עם אנשים חדשים אני בדרך כלל…",
          left: "קצת מובך/ת",
          right: "זורם/ת"
        },
        {
          question: "לפעמים אני מרגיש/ה שונה מאחרים",
          left: "כמעט אף פעם",
          right: "קורה לי"
        },
        {
          question: "יש משהו בעולם שבא לי לשנות",
          left: "לא ממש יודע/ת",
          right: "לגמרי כן"
        }
      ],
      ending: {
        title: "יפה, סיימתם את שער הסקרנות",
        text: "חזרו למרחב ההתכנסות לסיכום ולקראת המפגש הבא",
        button: "התחילו מחדש"
      }
    };

    let roundIndex = 0;
    let phaseIndex = 0;
    let timeLeft = CONTENT.phases[0].duration;
    let interval = null;
    let paused = false;
    let waitingForNextRound = false;
    let audioCtx = null;

    const $ = id => document.getElementById(id);

    function initText() {
      $("openTitle").textContent = CONTENT.opening.title;
      $("openSubtitle").textContent = CONTENT.opening.subtitle;
      $("startBtn").textContent = CONTENT.opening.button;
      $("endTitle").textContent = CONTENT.ending.title;
      $("endText").textContent = CONTENT.ending.text;
      $("restartBtn").textContent = CONTENT.ending.button;
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      $(id).classList.add("active");
    }

    function playTone(type = "start") {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";

        if (type === "start") {
          osc.frequency.setValueAtTime(660, now);
          osc.frequency.exponentialRampToValueAtTime(990, now + 0.18);
        } else {
          osc.frequency.setValueAtTime(420, now);
          osc.frequency.exponentialRampToValueAtTime(220, now + 0.22);
        }

        gain.gain.setValueAtTime(0.001, now);
        gain.gain.exponentialRampToValueAtTime(0.2, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.32);
      } catch (e) {}
    }

    function startActivity() {
      roundIndex = 0;
      phaseIndex = 0;
      paused = false;
      waitingForNextRound = false;
      showScreen("activity");
      loadStep();
      playTone("start");
      startTimer();
    }

    function loadStep() {
      const round = CONTENT.rounds[roundIndex];
      const phase = CONTENT.phases[phaseIndex];

      timeLeft = phase.duration;
      waitingForNextRound = false;

      $("roundLabel").textContent = `סבב ${roundIndex + 1} מתוך ${CONTENT.rounds.length}`;
      $("phaseLabel").textContent = phase.label;
      $("question").textContent = round.question;
      $("leftLabel").textContent = round.left;
      $("rightLabel").textContent = round.right;
      $("instruction").textContent = phase.instruction;
      $("pauseBtn").textContent = "השהה";
      $("nextBtn").textContent = phaseIndex === 0 ? "לשלב השיחה" : "סיים סבב";

      updateTimer();
      updateProgress();
    }

    function startTimer() {
      clearInterval(interval);
      interval = setInterval(() => {
        if (!paused && !waitingForNextRound) {
          timeLeft--;
          updateTimer();

          if (timeLeft <= 0) {
            handlePhaseEnd();
          }
        }
      }, 1000);
    }

    function handlePhaseEnd() {
      playTone("end");

      if (phaseIndex === 0) {
        phaseIndex = 1;
        loadStep();
        playTone("start");
        return;
      }

      waitingForNextRound = true;
      clearInterval(interval);

      $("timer").textContent = "✓";
      $("timer").classList.remove("pulse");

      if (roundIndex >= CONTENT.rounds.length - 1) {
        $("instruction").textContent = "סיימתם את כל הסבבים";
        $("nextBtn").textContent = "לסיום";
      } else {
        $("instruction").textContent = "לחצו כדי לעבור לסבב הבא";
        $("nextBtn").textContent = "הסבב הבא";
      }
    }

    function nextStep() {
      if (waitingForNextRound) {
        if (roundIndex >= CONTENT.rounds.length - 1) {
          $("progress").style.width = "100%";
          showScreen("ending");
          return;
        }

        roundIndex++;
        phaseIndex = 0;
        loadStep();
        playTone("start");
        startTimer();
        return;
      }

      if (phaseIndex === 0) {
        playTone("end");
        phaseIndex = 1;
        loadStep();
        playTone("start");
      } else {
        handlePhaseEnd();
      }
    }

    function togglePause() {
      paused = !paused;
      $("pauseBtn").textContent = paused ? "המשך" : "השהה";
    }

    function resetActivity() {
      clearInterval(interval);
      roundIndex = 0;
      phaseIndex = 0;
      paused = false;
      waitingForNextRound = false;
      $("progress").style.width = "0%";
      showScreen("opening");
    }

    function updateTimer() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;

      $("timer").textContent =
        minutes > 0
          ? `${minutes}:${String(seconds).padStart(2, "0")}`
          : seconds;

      $("timer").classList.toggle("pulse", timeLeft <= 5 && timeLeft > 0);
    }

    function updateProgress() {
      const totalSteps = CONTENT.rounds.length * CONTENT.phases.length;
      const currentStep = roundIndex * CONTENT.phases.length + phaseIndex;
      const percent = (currentStep / totalSteps) * 100;
      $("progress").style.width = `${percent}%`;
    }

    initText();
  </script>
</body>
</html>
