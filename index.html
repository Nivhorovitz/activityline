<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מנהל שער הסקרנות</title>

  <style>
    :root {
      --purple: #bcbfff;
      --lime: #e8ff6a;
      --bg: rgba(8, 10, 28, 0.74);
      --text: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, "Noto Sans Hebrew", sans-serif;
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      height: 100%;
      padding: 4px 22px;
      border-radius: 26px;
      background:
        radial-gradient(circle at 18% 50%, rgba(188,191,255,.22), transparent 34%),
        radial-gradient(circle at 84% 50%, rgba(232,255,106,.16), transparent 34%),
        var(--bg);
      border: 1px solid rgba(232,255,106,.5);
      box-shadow:
        inset 0 0 18px rgba(188,191,255,.12),
        0 0 18px rgba(188,191,255,.18);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
    }

    .screen.active { display: flex; }

    #opening, #ending {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3.5vw, 30px);
      color: var(--lime);
    }

    .subtitle, .end-text {
      font-size: clamp(13px, 2vw, 18px);
      color: #dfe1ff;
      font-weight: 700;
    }

    #activity {
      flex-direction: column;
      justify-content: space-between;
      gap: 2px;
    }

    .top-row {
      display: grid;
      grid-template-columns: 140px 1fr 260px;
      align-items: center;
      gap: 12px;
      min-height: 38px;
    }

    .round-label {
      color: var(--lime);
      font-size: 15px;
      font-weight: 900;
      text-align: right;
      white-space: nowrap;
    }

    .timer {
      justify-self: center;
      color: white;
      font-size: clamp(34px, 5vw, 52px);
      font-weight: 900;
      line-height: 1;
      padding: 0 18px;
      border-radius: 999px;
      background: transparent;
      border: none;
      white-space: nowrap;
      text-shadow: 0 0 16px rgba(255,255,255,.28);
    }

    .question {
      text-align: left;
      font-size: clamp(15px, 2vw, 22px);
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: white;
    }

    .line-row {
      display: grid;
      grid-template-columns: 105px 1fr 105px;
      align-items: center;
      gap: 12px;
      min-height: 28px;
    }

    .endpoint {
      font-size: clamp(18px, 2.6vw, 26px);
      font-weight: 900;
      white-space: nowrap;
    }

    .right {
      color: var(--lime);
      text-align: left;
    }

    .left {
      color: var(--purple);
      text-align: right;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--purple), var(--lime));
      box-shadow: 0 0 12px rgba(232,255,106,.34);
      position: relative;
    }

    .bar::after {
      content: "•••";
      position: absolute;
      top: -12px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,.72);
      font-size: 16px;
      letter-spacing: 6px;
    }

    .bottom-row {
      display: grid;
      grid-template-columns: 96px 1fr 96px;
      align-items: center;
      gap: 8px;
      min-height: 32px;
    }

    .instruction-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 0;
    }

    .instruction {
      color: var(--lime);
      font-size: clamp(17px, 2.7vw, 24px);
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      text-shadow: 0 0 13px rgba(232,255,106,.34);
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1;
    }

    .main {
      background: var(--lime);
      color: #101221;
      min-width: 95px;
      box-shadow: 0 0 10px rgba(232,255,106,.24);
    }

    .secondary {
      background: rgba(188,191,255,.13);
      color: white;
      border: 1px solid rgba(188,191,255,.48);
      min-width: 75px;
    }

    .reset-wrap { justify-self: right; }
    .pause-wrap { justify-self: left; }

    .progress-wrap {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,.12);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--purple), var(--lime));
      transition: width .35s linear;
    }

    .pulse {
      animation: pulse .7s infinite alternate;
      color: var(--lime);
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to {
        transform: scale(1.06);
        text-shadow: 0 0 18px rgba(232,255,106,.8);
      }
    }
  </style>
</head>

<body>
  <main class="app">

    <section id="opening" class="screen active">
      <h1 id="openTitle"></h1>
      <div id="openSubtitle" class="subtitle"></div>
      <button class="main" onclick="startActivity()" id="startBtn"></button>
    </section>

    <section id="activity" class="screen">
      <div class="top-row">
        <div id="roundLabel" class="round-label"></div>
        <div id="timer" class="timer"></div>
        <div id="question" class="question"></div>
      </div>

      <div class="line-row">
        <div id="rightLabel" class="endpoint right"></div>
        <div class="bar"></div>
        <div id="leftLabel" class="endpoint left"></div>
      </div>

      <div class="bottom-row">
        <div class="reset-wrap">
          <button class="secondary" onclick="resetActivity()">איפוס</button>
        </div>

        <div class="instruction-wrap">
          <div id="instruction" class="instruction"></div>
          <button class="main" onclick="nextStep()" id="nextBtn">הבא</button>
        </div>

        <div class="pause-wrap">
          <button class="secondary" onclick="togglePause()" id="pauseBtn">השהה</button>
        </div>
      </div>

      <div class="progress-wrap">
        <div id="progress" class="progress"></div>
      </div>
    </section>

    <section id="ending" class="screen">
      <h1 id="endTitle"></h1>
      <div id="endText" class="end-text"></div>
      <button class="main" onclick="resetActivity()" id="restartBtn"></button>
    </section>

  </main>

  <script>
    const CONTENT = {
      opening: {
        title: "שער הסקרנות",
        subtitle: "בכל סבב עומדים על הקו לפי מה שמתאים לכם",
        button: "התחילו"
      },
      phases: [
        {
          duration: 120,
          instruction: "מצאו את המקום שלכם על הקו"
        },
        {
          duration: 25,
          instruction: "דברו רגע עם מי שעומד לידכם"
        }
      ],
      rounds: [
        {
          question: "קל לי להכיר אנשים חדשים",
          left: "קשה לי",
          right: "קל לי"
        },
        {
          question: "כשאני עם אנשים חדשים אני בדרך כלל…",
          left: "קצת מובך/ת",
          right: "זורם/ת"
        },
        {
          question: "לפעמים אני מרגיש/ה שונה מאחרים",
          left: "כמעט אף פעם",
          right: "קורה לי"
        },
        {
          question: "יש משהו בעולם שבא לי לשנות",
          left: "לא ממש יודע/ת",
          right: "לגמרי כן"
        }
      ],
      ending: {
        title: "יפה, סיימתם את שער הסקרנות",
        text: "חזרו למרחב ההתכנסות לסיכום ולקראת המפגש הבא",
        button: "התחילו מחדש"
      }
    };

    let roundIndex = 0;
    let phaseIndex = 0;
    let timeLeft = CONTENT.phases[0].duration;
    let interval = null;
    let paused = false;
    let waitingForNextRound = false;
    let audioCtx = null;

    const $ = id => document.getElementById(id);

    function initText() {
      $("openTitle").textContent = CONTENT.opening.title;
      $("openSubtitle").textContent = CONTENT.opening.subtitle;
      $("startBtn").textContent = CONTENT.opening.button;
      $("endTitle").textContent = CONTENT.ending.title;
      $("endText").textContent = CONTENT.ending.text;
      $("restartBtn").textContent = CONTENT.ending.button;
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      $(id).classList.add("active");
    }

    function playTone(type = "start") {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";

        if (type === "start") {
          osc.frequency.setValueAtTime(660, now);
          osc.frequency.exponentialRampToValueAtTime(990, now + 0.18);
        } else {
          osc.frequency.setValueAtTime(420, now);
          osc.frequency.exponentialRampToValueAtTime(220, now + 0.22);
        }

        gain.gain.setValueAtTime(0.001, now);
        gain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.32);
      } catch (e) {}
    }

    function startActivity() {
      roundIndex = 0;
      phaseIndex = 0;
      paused = false;
      waitingForNextRound = false;
      showScreen("activity");
      loadStep();
      playTone("start");
      startTimer();
    }

    function loadStep() {
      const round = CONTENT.rounds[roundIndex];
      const phase = CONTENT.phases[phaseIndex];

      timeLeft = phase.duration;
      waitingForNextRound = false;

      $("roundLabel").textContent = `סבב ${roundIndex + 1} מתוך ${CONTENT.rounds.length}`;
      $("question").textContent = round.question;
      $("leftLabel").textContent = round.left;
      $("rightLabel").textContent = round.right;
      $("instruction").textContent = phase.instruction;
      $("pauseBtn").textContent = "השהה";
      $("nextBtn").textContent = phaseIndex === 0 ? "לשלב השיחה" : "סיים סבב";

      updateTimer();
      updateProgress();
    }

    function startTimer() {
      clearInterval(interval);
      interval = setInterval(() => {
        if (!paused && !waitingForNextRound) {
          timeLeft--;
          updateTimer();
          if (timeLeft <= 0) handlePhaseEnd();
        }
      }, 1000);
    }

    function handlePhaseEnd() {
      playTone("end");

      if (phaseIndex === 0) {
        phaseIndex = 1;
        loadStep();
        playTone("start");
        return;
      }

      waitingForNextRound = true;
      clearInterval(interval);

      $("timer").textContent = "✓";
      $("timer").classList.remove("pulse");

      if (roundIndex >= CONTENT.rounds.length - 1) {
        $("instruction").textContent = "סיימתם את כל הסבבים";
        $("nextBtn").textContent = "לסיום";
      } else {
        $("instruction").textContent = "מוכנים? עברו לסבב הבא";
        $("nextBtn").textContent = "הסבב הבא";
      }
    }

    function nextStep() {
      if (waitingForNextRound) {
        if (roundIndex >= CONTENT.rounds.length - 1) {
          $("progress").style.width = "100%";
          showScreen("ending");
          return;
        }

        roundIndex++;
        phaseIndex = 0;
        loadStep();
        playTone("start");
        startTimer();
        return;
      }

      if (phaseIndex === 0) {
        playTone("end");
        phaseIndex = 1;
        loadStep();
        playTone("start");
      } else {
        handlePhaseEnd();
      }
    }

    function togglePause() {
      paused = !paused;
      $("pauseBtn").textContent = paused ? "המשך" : "השהה";
    }

    function resetActivity() {
      clearInterval(interval);
      roundIndex = 0;
      phaseIndex = 0;
      paused = false;
      waitingForNextRound = false;
      $("progress").style.width = "0%";
      showScreen("opening");
    }

    function updateTimer() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;

      $("timer").textContent =
        minutes > 0
          ? `${minutes}:${String(seconds).padStart(2, "0")}`
          : seconds;

      $("timer").classList.toggle("pulse", timeLeft <= 5 && timeLeft > 0);
    }

    function updateProgress() {
      const totalSteps = CONTENT.rounds.length * CONTENT.phases.length;
      const currentStep = roundIndex * CONTENT.phases.length + phaseIndex;
      $("progress").style.width = `${(currentStep / totalSteps) * 100}%`;
    }

    initText();
  </script>
</body>
</html>
