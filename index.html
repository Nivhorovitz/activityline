<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מנהל שער הסקרנות</title>

  <style>
    :root {
      --purple: #bcbfff;
      --lime: #e8ff6a;
      --white: #ffffff;
      --panel: rgba(8, 10, 28, 0.76);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 230px;
      overflow: hidden;
      background: transparent;
      font-family: Arial, "Noto Sans Hebrew", sans-serif;
      color: var(--white);
    }

    .app {
      position: relative;
      width: 100%;
      height: 200px;
      margin-top: 15px;
      overflow: hidden;
      border-radius: 30px;
      border: 1px solid rgba(232, 255, 106, 0.58);
      background:
        radial-gradient(circle at 18% 50%, rgba(188, 191, 255, 0.22), transparent 36%),
        radial-gradient(circle at 82% 50%, rgba(232, 255, 106, 0.16), transparent 36%),
        var(--panel);
      box-shadow:
        inset 0 0 20px rgba(188, 191, 255, 0.14),
        0 0 14px rgba(232, 255, 106, 0.12);
    }

    .screen {
      display: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 200px;
      overflow: hidden;
    }

    .screen.active { display: block; }

    .meta-round {
      position: absolute;
      top: 16px;
      right: 40px;
      height: 18px;
      font-size: 18px;
      line-height: 18px;
      font-weight: 900;
      color: var(--lime);
      white-space: nowrap;
    }

    .meta-phase {
      position: absolute;
      top: 16px;
      left: 40px;
      height: 18px;
      font-size: 17px;
      line-height: 18px;
      font-weight: 900;
      color: var(--purple);
      white-space: nowrap;
    }

    .timer {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      height: 52px;
      font-size: 56px;
      line-height: 52px;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 1px;
      white-space: nowrap;
      text-shadow: 0 0 16px rgba(255, 255, 255, 0.28);
    }

    .question {
      position: absolute;
      top: 88px;
      left: 20%;
      width: 60%;
      height: 24px;
      font-size: 22px;
      line-height: 24px;
      font-weight: 900;
      text-align: center;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .scale-row {
      position: absolute;
      top: 104px;
      left: 8%;
      width: 84%;
      height: 30px;
    }

    .endpoint {
      position: absolute;
      top: -1px;
      width: 118px;
      height: 30px;
      font-size: 25px;
      line-height: 30px;
      font-weight: 900;
      white-space: nowrap;
    }

    .endpoint-right {
      right: 0;
      text-align: right;
      color: var(--lime);
    }

    .endpoint-left {
      left: 0;
      text-align: left;
      color: var(--purple);
    }

    .scale-bar {
      position: absolute;
      top: 13px;
      left: 126px;
      right: 126px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--purple), var(--lime));
      box-shadow: 0 0 12px rgba(232, 255, 106, 0.34);
    }

    .controls-row {
      position: absolute;
      left: 40px;
      right: 40px;
      bottom: 14px;
      height: 30px;
    }

    .btn-left {
      position: absolute;
      left: 0;
      top: 1px;
    }

    .btn-right {
      position: absolute;
      right: 0;
      top: 1px;
    }

    .center-actions {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 640px;
      height: 30px;
      text-align: center;
      white-space: nowrap;
    }

    .instruction {
      display: inline-block;
      vertical-align: top;
      height: 30px;
      font-size: 20px;
      line-height: 30px;
      font-weight: 900;
      color: var(--lime);
      white-space: nowrap;
      text-shadow: 0 0 12px rgba(232, 255, 106, 0.36);
    }

    button {
      height: 28px;
      max-height: 28px;
      border: none;
      border-radius: 999px;
      padding: 0 18px;
      font-family: inherit;
      font-size: 14px;
      line-height: 28px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .main-btn {
      display: inline-block;
      vertical-align: top;
      margin-left: 18px;
      min-width: 132px;
      color: #101221;
      background: var(--lime);
      box-shadow: 0 0 12px rgba(232, 255, 106, 0.28);
    }

    .side-btn {
      min-width: 112px;
      color: var(--white);
      background: rgba(188, 191, 255, 0.13);
      border: 1px solid rgba(188, 191, 255, 0.55);
    }

    .open-title,
    .end-title {
      position: absolute;
      top: 42px;
      left: 0;
      width: 100%;
      margin: 0;
      text-align: center;
      font-size: 38px;
      line-height: 40px;
      font-weight: 900;
      color: var(--lime);
    }

    .open-subtitle,
    .end-text {
      position: absolute;
      top: 92px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 21px;
      line-height: 24px;
      font-weight: 800;
      color: #dfe1ff;
    }

    .open-button,
    .end-button {
      position: absolute;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%);
    }

    .pulse {
      animation: pulse 0.7s infinite alternate;
      color: var(--lime);
    }

    @keyframes pulse {
      from {
        transform: translateX(-50%) scale(1);
      }
      to {
        transform: translateX(-50%) scale(1.06);
        text-shadow: 0 0 24px rgba(232, 255, 106, 0.85);
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section id="opening" class="screen active">
      <h1 id="openTitle" class="open-title"></h1>
      <div id="openSubtitle" class="open-subtitle"></div>
      <button id="startBtn" class="main-btn open-button" onclick="startActivity()"></button>
    </section>

    <section id="activity" class="screen">
      <div id="roundLabel" class="meta-round"></div>
      <div id="phaseLabel" class="meta-phase"></div>

      <div id="timer" class="timer"></div>
      <div id="question" class="question"></div>

      <div class="scale-row">
        <div id="rightLabel" class="endpoint endpoint-right"></div>
        <div class="scale-bar"></div>
        <div id="leftLabel" class="endpoint endpoint-left"></div>
      </div>

      <div class="controls-row">
        <button id="pauseBtn" class="side-btn btn-left" onclick="togglePause()">השהה</button>

        <div class="center-actions">
          <button id="nextBtn" class="main-btn" onclick="nextStep()">הבא</button>
          <div id="instruction" class="instruction"></div>
        </div>

        <button class="side-btn btn-right" onclick="resetActivity()">איפוס</button>
      </div>
    </section>

    <section id="ending" class="screen">
      <h1 id="endTitle" class="end-title"></h1>
      <div id="endText" class="end-text"></div>
      <button id="restartBtn" class="main-btn end-button" onclick="resetActivity()"></button>
    </section>
  </main>

  <script>
    const CONTENT = {
      opening: {
        title: "שער הסקרנות",
        subtitle: "בכל סבב עומדים על הקו לפי מה שמתאים לכם",
        button: "התחילו"
      },
      phases: [
        {
          duration: 120,
          label: "שלב א׳",
          instruction: "מצאו את המקום שלכם על הקו"
        },
        {
          duration: 25,
          label: "שלב ב׳",
          instruction: "דברו רגע עם מי שעומד לידכם"
        }
      ],
      rounds: [
        {
          question: "קל לי להכיר אנשים חדשים",
          left: "קשה לי",
          right: "קל לי"
        },
        {
          question: "כשאני עם אנשים חדשים אני בדרך כלל…",
          left: "קצת מובך/ת",
          right: "זורם/ת"
        },
        {
          question: "לפעמים אני מרגיש/ה שונה מאחרים",
          left: "כמעט אף פעם",
          right: "קורה לי"
        },
        {
          question: "יש משהו בעולם שבא לי לשנות",
          left: "לא ממש יודע/ת",
          right: "לגמרי כן"
        }
      ],
      ending: {
        title: "יפה, סיימתם את שער הסקרנות",
        text: "חזרו למרחב ההתכנסות לסיכום ולקראת המפגש הבא",
        button: "התחילו מחדש"
      }
    };

    let roundIndex = 0;
    let phaseIndex = 0;
    let timeLeft = CONTENT.phases[0].duration;
    let interval = null;
    let paused = false;
    let waitingForNextRound = false;
    let audioCtx = null;

    const $ = (id) => document.getElementById(id);

    function initText() {
      $("openTitle").textContent = CONTENT.opening.title;
      $("openSubtitle").textContent = CONTENT.opening.subtitle;
      $("startBtn").textContent = CONTENT.opening.button;
      $("endTitle").textContent = CONTENT.ending.title;
      $("endText").textContent = CONTENT.ending.text;
      $("restartBtn").textContent = CONTENT.ending.button;
    }

    function showScreen(screenId) {
      document.querySelectorAll(".screen").forEach((screen) => {
        screen.classList.remove("active");
      });
      $(screenId).classList.add("active");
    }

    function playTone(type) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();

        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";

        if (type === "start") {
          osc.frequency.setValueAtTime(660, now);
          osc.frequency.exponentialRampToValueAtTime(990, now + 0.18);
        } else {
          osc.frequency.setValueAtTime(420, now);
          osc.frequency.exponentialRampToValueAtTime(220, now + 0.22);
        }

        gain.gain.setValueAtTime(0.001, now);
        gain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.32);
      } catch (error) {}
    }

    function startActivity() {
      roundIndex = 0;
      phaseIndex = 0;
      paused = false;
      waitingForNextRound = false;

      showScreen("activity");
      loadStep();
      playTone("start");
      startTimer();
    }

    function loadStep() {
      const round = CONTENT.rounds[roundIndex];
      const phase = CONTENT.phases[phaseIndex];

      timeLeft = phase.duration;
      waitingForNextRound = false;

      $("roundLabel").textContent = `סבב ${roundIndex + 1} מתוך ${CONTENT.rounds.length}`;
      $("phaseLabel").textContent = phase.label;
      $("question").textContent = round.question;
      $("rightLabel").textContent = round.right;
      $("leftLabel").textContent = round.left;
      $("instruction").textContent = phase.instruction;
      $("pauseBtn").textContent = "השהה";
      $("nextBtn").textContent = phaseIndex === 0 ? "לשלב השיחה" : "סיים סבב";

      updateTimer();
    }

    function startTimer() {
      clearInterval(interval);

      interval = setInterval(() => {
        if (!paused && !waitingForNextRound) {
          timeLeft--;
          updateTimer();

          if (timeLeft <= 0) {
            handlePhaseEnd();
          }
        }
      }, 1000);
    }

    function handlePhaseEnd() {
      playTone("end");

      if (phaseIndex === 0) {
        phaseIndex = 1;
        loadStep();
        playTone("start");
        return;
      }

      waitingForNextRound = true;
      clearInterval(interval);

      $("timer").textContent = "✓";
      $("timer").classList.remove("pulse");

      if (roundIndex >= CONTENT.rounds.length - 1) {
        $("instruction").textContent = "סיימתם את כל הסבבים";
        $("nextBtn").textContent = "לסיום";
      } else {
        $("instruction").textContent = "מוכנים? עברו לסבב הבא";
        $("nextBtn").textContent = "הסבב הבא";
      }
    }

    function nextStep() {
      if (waitingForNextRound) {
        if (roundIndex >= CONTENT.rounds.length - 1) {
          showScreen("ending");
          return;
        }

        roundIndex++;
        phaseIndex = 0;
        loadStep();
        playTone("start");
        startTimer();
        return;
      }

      if (phaseIndex === 0) {
        playTone("end");
        phaseIndex = 1;
        loadStep();
        playTone("start");
      } else {
        handlePhaseEnd();
      }
    }

    function togglePause() {
      paused = !paused;
      $("pauseBtn").textContent = paused ? "המשך" : "השהה";
    }

    function resetActivity() {
      clearInterval(interval);

      roundIndex = 0;
      phaseIndex = 0;
      paused = false;
      waitingForNextRound = false;

      showScreen("opening");
    }

    function updateTimer() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;

      $("timer").textContent =
        minutes > 0
          ? `${minutes}:${String(seconds).padStart(2, "0")}`
          : seconds;

      $("timer").classList.toggle("pulse", timeLeft <= 5 && timeLeft > 0);
    }

    initText();
  </script>
</body>
</html>
